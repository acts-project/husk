name: ci

# Lint + run the pytest suite on every push and PR. No secrets needed: the
# tests that touch a GitHub token inject a fake one (monkeypatch GH_TOKEN), and
# the libvirt-backed tests `pytest.importorskip("libvirt")`, so the suite runs
# green without libvirt headers or a real PAT. That's why we install only the
# `dev` extra here (not `libvirt`) — same rationale as the OpenStack/CI path.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pre-commit:
    # Runs the prek hooks (trailing-whitespace, end-of-file-fixer, ruff-format)
    # over the whole tree — the same hooks used locally, so CI catches anything
    # committed without them. prek reads .pre-commit-config.yaml.
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - run: uvx prek run --all-files --show-diff-on-failure --color=always

  zizmor:
    # Static analysis of the workflow files themselves (zizmorcore/zizmor). Our
    # .github/zizmor.yml requires every `uses:` to be hash-pinned; this is what
    # fails CI if someone adds an unpinned action.
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - run: uvx zizmor --persona=regular .github/workflows/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install project (dev extra)
        run: uv sync --extra dev

      - name: Lint (ruff)
        # Scoped to the package + suite; the root-level phase/one-off scripts
        # (phase3-recycle.py, measure-standup.py, …) aren't shipped and aren't
        # kept lint-clean.
        run: uv run ruff check src tests

      - name: Test (pytest)
        run: uv run pytest -q
