name: build-images

# Build the husk golden VM images (base + gpu) with virt-customize and publish
# the qcow2 artifacts to ghcr.io via ORAS. See image-pipeline.md (Phase A).
#
# Build + static smoke run on every relevant push (CI signal). Publishing to
# ghcr only happens on a manual run (workflow_dispatch) — so feature branches
# don't push images by accident. Pin a release tag via the `version` input.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Image tag to publish (e.g. v1). Blank -> 0.0.0-<date>."
        required: false
        default: ""
  push:
    paths:
      - "images/**"
      - ".github/workflows/build-images.yml"

permissions:
  contents: read
  packages: write

concurrency:
  group: build-images-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        variant: [base, gpu]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install build tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y guestfs-tools qemu-utils

      - name: Prepare libguestfs backend
        # ubuntu-22.04 ships libguestfs 1.46, whose appliance uses qemu SLIRP
        # user-networking (not passt) — virt-customize --install works out of the
        # box. (24.04 + libguestfs 1.52 + passt never gets a working appliance
        # NIC in the GHA sandbox: eth0 stays DOWN. Hence the 22.04 pin.) The only
        # gotcha left is the mode-0600 kernel libguestfs can't read.
        run: |
          sudo chmod 0644 /boot/vmlinuz-* || true
          if [ -e /dev/kvm ]; then sudo chmod 0666 /dev/kvm; echo "KVM available"; else echo "no /dev/kvm -> TCG emulation (slow)"; fi
          echo "LIBGUESTFS_BACKEND=direct" >> "$GITHUB_ENV"

      - name: Build ${{ matrix.variant }} image
        run: |
          ./images/build.sh --variant "${{ matrix.variant }}" --out "husk-${{ matrix.variant }}.qcow2"

      - name: Smoke (static assertions)
        # Assert the build didn't silently drop a step (virt-customize aborts a
        # later op without failing the whole run in some cases). Read-only.
        run: |
          img="husk-${{ matrix.variant }}.qcow2"
          fail=0
          for p in \
            /opt/actions-runner/run.sh \
            /usr/local/bin/docker \
            /etc/systemd/system/husk-runner.service \
            /etc/systemd/system/husk-poweroff.service \
            /etc/containers/containers.conf \
            /etc/cloud/cloud.cfg.d/90-husk-datasource.cfg \
            /var/lib/systemd/linger/runner \
            /usr/local/bin/node_exporter \
            /etc/systemd/system/husk-node-exporter.service \
            /usr/local/bin/husk-bootreport \
            /etc/systemd/system/husk-bootreport.service ; do
            if [ "$(guestfish --ro -a "$img" -i exists "$p")" != "true" ]; then
              echo "MISSING: $p"; fail=1
            fi
          done
          echo "==> boot-report / metrics wiring"
          # The textfile collector is two halves that fail silently and separately:
          # a directory node_exporter reads, and the flag telling it to. Missing
          # either one costs no boot and no error — the metrics are just never
          # there. Assert both, since that is exactly the class of drop this step
          # exists to catch.
          if [ "$(guestfish --ro -a "$img" -i is-dir /var/lib/node_exporter/textfile)" != "true" ]; then
            echo "MISSING: /var/lib/node_exporter/textfile (dir)"; fail=1
          fi
          guestfish --ro -a "$img" -i cat /etc/systemd/system/husk-node-exporter.service \
            | grep -q -- '--collector.textfile.directory=/var/lib/node_exporter/textfile' \
            || { echo "MISSING: textfile collector flag on node_exporter"; fail=1; }
          # It runs as a python3 script on the guest; a shebang that isn't there
          # turns every boot report into a silent no-op.
          guestfish --ro -a "$img" -i exists /usr/bin/python3 | grep -q true \
            || { echo "MISSING: /usr/bin/python3 (husk-bootreport interpreter)"; fail=1; }
          echo "==> baked packages"
          guestfish --ro -a "$img" -i command "rpm -q podman nftables podman-docker libicu"
          if [ "${{ matrix.variant }}" = "gpu" ]; then
            echo "==> gpu packages + CDI oneshot"
            guestfish --ro -a "$img" -i command "rpm -q nvidia-driver nvidia-container-toolkit"
            [ "$(guestfish --ro -a "$img" -i exists /etc/systemd/system/husk-cdi.service)" = "true" ] || { echo "MISSING: husk-cdi.service"; fail=1; }
          fi
          exit $fail

      - name: Set up ORAS
        if: github.event_name == 'workflow_dispatch'
        uses: oras-project/setup-oras@1d808f7d7f6995cc68b7bf507bfe5c5446e1dc9d # v2.0.1

      - name: Publish to ghcr.io
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Kept out of the inline script so an attacker-controllable value can't
          # expand into shell code (zizmor template-injection).
          INPUT_VERSION: ${{ github.event.inputs.version }}
          ACTOR: ${{ github.actor }}
        run: |
          set -euo pipefail
          # shellcheck disable=SC1091
          source images/versions.env

          version="$INPUT_VERSION"
          [ -n "$version" ] || version="0.0.0-$(date +%Y%m%d)"
          sha="${GITHUB_SHA::7}"
          repo="ghcr.io/${{ github.repository_owner }}/husk-${{ matrix.variant }}"
          img="husk-${{ matrix.variant }}.qcow2"

          echo "$GH_TOKEN" | oras login ghcr.io -u "$ACTOR" --password-stdin

          oras push "${repo}:${version},${sha}" \
            --artifact-type application/vnd.husk.vmimage \
            --annotation "org.opencontainers.image.source=https://github.com/${{ github.repository }}" \
            --annotation "org.opencontainers.image.revision=${{ github.sha }}" \
            --annotation "husk.variant=${{ matrix.variant }}" \
            --annotation "husk.runner.version=${RUNNER_VERSION}" \
            --annotation "husk.base.url=${BASE_IMAGE_URL}" \
            "${img}:application/vnd.husk.qcow2" | tee push.log

          digest="$(grep -iE '^Digest:' push.log | awk '{print $2}')"
          {
            echo "### husk-${{ matrix.variant }} published"
            echo ""
            echo "| field | value |"
            echo "|---|---|"
            echo "| repo | \`${repo}\` |"
            echo "| tags | \`${version}\`, \`${sha}\` |"
            echo "| digest | \`${digest}\` |"
            echo "| runner | \`${RUNNER_VERSION}\` |"
            echo ""
            echo "Pin downstream by digest: \`${repo}@${digest}\`"
          } >> "$GITHUB_STEP_SUMMARY"
