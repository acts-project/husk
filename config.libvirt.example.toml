# Example huskd config: a single libvirt/QEMU pool (GPU CI runners). A single
# backend is just one [[pool]]. See config.example.toml for a two-pool daemon
# (OpenStack CPU + libvirt GPU at once).

[github]                               # GitHub App identity (replaces repo + PAT)
app_id = 123456                        # from the App's settings page
private_key_path = "/etc/husk/husk-app.pem"   # or env HUSK_GITHUB__PRIVATE_KEY (PEM contents)

# Each [[pool]] names the ONE target it serves:
#   target = { org  = "acts-project", group = "husk" }   # org-level runners
#   target = { repo = "owner/name" }                     # that repo only
# `group` is an org-only concept (repo scope has no runner groups), so the schema
# only lets you write one where it means something. A pool is served when the App
# is installed on that org / that repo was granted to the install; otherwise the
# pool drains and idles.

[controller]
lock_path = "/tmp/huskd.lock"
http_addr = "127.0.0.1:9100"
shrink_ticks = 3
# image_cache_dir = "/var/cache/husk/images"   # optional; default ~/.cache/husk/images. Shared by every pool
# Self-GC'd: a golden no pool still needs is dropped 24h after its last use, so the
# cache holds the images in service plus roughly a day of rollout churn.
# metrics_state_path = "/var/lib/husk/metrics.json"  # optional; keeps counters/histograms across restarts

[[pool]]
name = "libvirt-gpu"          # → backend name + default vm_prefix "husk-libvirt-gpu"
target = { org = "acts-project", group = "husk" }

[pool.runner]
version = "2.334.0"
labels = ["self-hosted", "linux", "x64", "gpu"]   # jobs target the GPU pool via `gpu`
# gpu = true       # activate the NVIDIA driver (modprobe + CDI) each boot
# prebaked = true  # set when image_ref points at a golden image: cloud-init skips
#                  # the install steps (podman, runner, driver — all baked). In
#                  # prebaked mode the baked runner version is authoritative, so
#                  # `version` above must match the image's husk.runner.version.
# In-guest metrics (observability.md). Opens :9100 (node_exporter, baked into the
# golden) to this source ONLY — it has no TLS/auth, so the allowlist IS the access
# control. Requires prebaked; unset = fail-closed (no rule, no exporter running).
# On libvirt the guest sits on a private net only its hypervisor can reach, so
# huskd bridges the scrape over the SSH channel it already has to the host. The
# connection is issued FROM the host, so the libvirt bridge — not Prometheus — is
# the only client the guest ever sees. 192.168.122.1 is the default net's bridge.
# Nothing to install on the hypervisor.
# scrape_cidr = "192.168.122.1/32"

[pool.backend]
type = "libvirt"
min_ready = 2                          # global warm-pool size across all hosts
max_total = 2                          # one GPU host, one GPU → 1 (raise as the pool grows)

# Image source — pick ONE:
#  (a) image_ref: an OCI artifact built by build-images.yml and published to
#      ghcr. The controller `oras pull`s it once to a local cache and scp's it to
#      every host pool (named by content digest). Pin a tag or a digest. To roll
#      out a new build, edit this and restart huskd: the new image is staged and
#      idle slots drain onto it (running jobs finish first), old goldens are GC'd.
image_ref = "ghcr.io/acts-project/husk-gpu:v1"
#
#  (b) image_name: a qcow2 filename you placed in each host's pool dir yourself
#      (the manual path — no registry, no auto-sync/drain).
# image_name = "husk-gpu-golden.qcow2"

# One entry per VM-host. GPU host: list gpu_pci_addresses (one slot per GPU).
# CPU host: omit them and set max_slots (default 1). Setting both is rejected.
[[pool.backend.hosts]]
name = "fedora-gpu-01"
libvirt_uri = "qemu+ssh://USER@HOST/system"
# ssh_target = "USER@HOST"             # optional; derived from libvirt_uri if omitted
storage_pool = "husk"
network = "default"
memory_mb = 8192
vcpus = 8
gpu_pci_addresses = ["0000:01:00.0"]   # → one slot, GPU passed through via <hostdev>
# NB: no metrics knob here. huskd reaches this host's guests over ssh_target, so
# adding a hypervisor requires no per-host metrics setup.

# --- A CPU-only host would look like this instead (no GPU required): ---
# [[pool.backend.hosts]]
# name = "cpu-host-01"
# libvirt_uri = "qemu+ssh://USER@CPUHOST/system"
# memory_mb = 4096
# vcpus = 4
# max_slots = 2                        # two plain CPU VMs on this host

[pool.timeouts]
poll_interval_sec = 30
idle_timeout_sec = 1800
startup_grace_sec = 300
max_job_duration_sec = 21600
