<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{% block title %}husk{% endblock %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root { color-scheme: dark; }
    body { margin:0; font:13px/1.45 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
           background:#0d1117; color:#c9d1d9; }
    header { padding:10px 16px; border-bottom:1px solid #21262d; display:flex; gap:14px;
             align-items:center; position:sticky; top:0; background:#0d1117; z-index:1; }
    header h1 { font-size:15px; margin:0; font-weight:600; letter-spacing:1px; }
    #conn { margin-left:auto; }
    .ok { color:#3fb950; } .bad { color:#f85149; } .dim { color:#6e7681; }
    .pool { margin:16px; border:1px solid #21262d; border-radius:8px; overflow:hidden; }
    .pool > .head { padding:9px 14px; background:#161b22; display:flex; flex-wrap:wrap;
                    gap:4px 18px; align-items:baseline; }
    .tablewrap { overflow-x:auto; }
    .name { font-size:14px; font-weight:600; color:#58a6ff; }
    .meta { color:#8b949e; }
    .counts span { margin-right:11px; }
    table { width:100%; border-collapse:collapse; }
    th,td { text-align:left; padding:5px 10px; white-space:nowrap; }
    th { color:#8b949e; font-weight:600; border-bottom:1px solid #21262d; font-size:11px;
         text-transform:uppercase; letter-spacing:.4px; }
    th.num,td.num { text-align:right; }
    .tip { cursor:help; text-decoration:underline dotted #6e7681; text-underline-offset:3px; }
    tbody tr:nth-child(even){ background:#0f141a; }
    .empty { padding:12px 14px; color:#6e7681; }
    .s-idle{color:#3fb950} .s-busy{color:#39c5cf} .s-starting{color:#d29922}
    .s-needs_recycle{color:#58a6ff} .s-unhealthy{color:#f85149}
    .s-error{color:#f85149;font-weight:700}
    .stale{color:#f85149}
    tr.errored td { background:#2b1416; }
    .ops { padding:7px 14px; border-bottom:1px solid #21262d; background:#11161d;
           display:flex; flex-wrap:wrap; gap:6px 10px; align-items:center; }
    .ops .lbl { color:#8b949e; text-transform:uppercase; letter-spacing:.4px; font-size:11px; }
    .op { display:inline-flex; gap:7px; align-items:baseline; padding:2px 9px;
          border:1px solid #21262d; border-radius:12px; background:#0d1117; }
    .op .kind { color:#c9d1d9; }
    .op .prog { color:#8b949e; }
    .op .err { color:#f85149; }
    .op.pending .dot{ color:#d29922; } .op.done .dot{ color:#3fb950; }
    .op.failed .dot{ color:#f85149; }
    .op .dot { animation:none; }
    .op.pending .dot { animation:pulse 1.4s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  </style>
</head>
<body>
  <header>
    <h1>husk</h1>
    {% block headerextra %}{% endblock %}
    <span id="conn"></span>
  </header>
  <main>{% block body %}{% endblock %}</main>
  {% block scripts %}{% endblock %}
</body>
</html>
