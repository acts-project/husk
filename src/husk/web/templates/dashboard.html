{% extends "base.html" %}
{% block headerextra %}<span class="dim">live via SSE</span>{% endblock %}
{% block body %}<div id="pools"></div>{% endblock %}
{% block scripts %}
<script>
const STATES = ["idle","busy","starting","needs_recycle","unhealthy","error"];

const ago = e => { const s = Math.max(0, Date.now()/1000 - e);
  return s<90 ? Math.round(s)+"s ago" : s<5400 ? Math.round(s/60)+"m ago" : (s/3600).toFixed(1)+"h ago"; };
const secs = v => v==null ? "-" : Math.round(v)+"s";
const pct = v => v==null ? "-" : Math.round(v*100)+"%";
const esc = s => (s==null ? "" : ""+s).replace(/[&<>]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));

// A breakdown of the recycle (issue→online) duration, shown on hover — the
// controller's own clock, split into spawn + cloud-init. The finer-grained guest
// view (per-runcmd-step timings, systemd/cloud-init blame) is no longer read off
// the console into here: the slot publishes it itself, via node_exporter's
// textfile collector, as husk_cloudinit_step_seconds & co. Prometheus is the
// place to drill into a slow boot; this tooltip stays the at-a-glance version.
function recycleTip(v) {
  if (v.recycle_seconds == null) return "";
  const L = [`recycle ${secs(v.recycle_seconds)}`];
  if (v.boot_seconds != null)      L.push(`  spawn        ${secs(v.boot_seconds)}`);
  if (v.cloudinit_seconds != null) L.push(`  cloud-init   ${secs(v.cloudinit_seconds)}`);
  return L.join("\n");
}

function opsHtml(ops) {
  if (!ops || !ops.length) return "";
  // Newest first; show in-flight before recently-done.
  const order = { pending: 0, failed: 1, done: 2 };
  const chips = ops.slice()
    .sort((a,b) => (order[a.state]-order[b.state]) || (b.started_at-a.started_at))
    .map(o => {
      const detail = o.state === "failed"
        ? `<span class="err">${esc(o.error || "failed")}</span>`
        : o.state === "done"
          ? `<span class="prog">done</span>`
          : `<span class="prog">${esc(o.progress || "working")}${o.attempts>1 ? " ·#"+o.attempts : ""}</span>`;
      return `<span class="op ${o.state}" title="${esc(o.key)}">
          <span class="dot">●</span><span class="kind">${esc(o.kind)}</span>
          ${detail}<span class="prog">${ago(o.started_at)}</span></span>`;
    }).join("");
  return `<div class="ops"><span class="lbl">staging</span>${chips}</div>`;
}

function poolHtml(p) {
  const stale = (Date.now()/1000 - p.last_reconcile_epoch) > 60;
  const counts = STATES.map(s => `<span class="s-${s}">${s}=${p.counts[s]||0}</span>`).join("");
  let body;
  if (!p.slots.length) {
    body = `<div class="empty">(no managed slots)</div>`;
  } else {
    const rows = p.slots.slice()
      .sort((a,b) => (a.name+a.id).localeCompare(b.name+b.id))
      .map(v => {
        const rec = v.recycle_seconds == null
          ? `<td class="num">-</td>`
          : `<td class="num"><span class="tip" title="${esc(recycleTip(v))}">${secs(v.recycle_seconds)}</span></td>`;
        const imgTitle = v.image_stale
          ? "stale — older than the pool current golden; will drain onto it"
          : "current image";
        const img = !v.image
          ? `<td>-</td>`
          : `<td><span class="${v.image_stale ? "stale" : "dim"}" title="${imgTitle}">${esc(v.image)}${v.image_stale ? " ⚠" : ""}</span></td>`;
        const errShort = v.error && v.error.length > 48 ? v.error.slice(0,48) + "…" : v.error;
        const err = !v.error
          ? `<td>-</td>`
          : `<td class="stale" title="${esc(v.error)}${v.error_epoch ? " ("+ago(v.error_epoch)+")" : ""}">⚠ ${esc(errShort)}</td>`;
        return `
        <tr class="${v.error ? "errored" : ""}">
          <td>${esc(v.id)}</td><td>${esc(v.name)}</td>
          <td class="s-${v.state}">${esc(v.state)}</td>
          <td>${esc(v.status)}</td><td>${esc(v.task_state||"-")}</td>
          <td>${esc(v.runner||"-")}</td>
          <td>${v.runner_status ? (v.runner_status==="online"
                ? '<span class="s-idle">online</span>'
                : '<span class="dim">'+esc(v.runner_status)+'</span>') : "-"}</td>
          <td>${v.busy ? '<span class="s-busy">yes</span>' : "-"}</td>
          <td class="num">${v.cycle}</td>
          ${img}
          ${rec}
          <td class="num">${pct(v.live_fraction)}</td>
          ${err}
        </tr>`;
      }).join("");
    body = `<div class="tablewrap"><table><thead><tr>
        <th>ID</th><th>NAME</th><th>STATE</th><th>NOVA</th><th>TASK</th>
        <th>RUNNER</th><th>RUNNER ST</th><th>BUSY</th>
        <th class="num">CYCLE</th>
        <th>IMAGE</th>
        <th class="num">RECYCLE</th><th class="num">LIVE%</th>
        <th>LAST ERROR</th>
      </tr></thead><tbody>${rows}</tbody></table></div>`;
  }
  return `<section class="pool"><div class="head">
      <span class="name">${esc(p.backend)}</span>
      <span class="meta">desired=${p.desired_total} min_ready=${p.min_ready} max_total=${p.max_total}${p.image_ref ? " · image " + esc(p.image_ref.split("/").pop()) : ""}</span>
      <span class="meta ${stale ? "stale" : ""}">updated ${ago(p.last_reconcile_epoch)}${stale ? " — stale?" : ""} · gen ${p.generation}</span>
      <span class="counts">${counts}</span>
    </div>${opsHtml(p.ops)}${body}</section>`;
}

function render(pools) {
  document.getElementById("pools").innerHTML =
    pools.map(poolHtml).join("") || `<div class="empty" style="margin:16px">no pools</div>`;
}

const conn = document.getElementById("conn");
const es = new EventSource("/events");
es.onmessage = e => {
  try { render(JSON.parse(e.data)); conn.innerHTML = '<span class="ok">●</span> live'; }
  catch (err) { /* ignore a malformed frame; next push corrects it */ }
};
es.onerror = () => { conn.innerHTML = '<span class="bad">●</span> reconnecting…'; };
</script>
{% endblock %}
