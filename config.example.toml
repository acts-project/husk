# Husk controller config — ONE huskd driving N pools. Precedence for the shared
# [github]/[controller] sections: env (HUSK_*) > this file > defaults. Per-pool
# knobs ([[pool]]) are TOML-only.
#
# This example runs TWO pools at once: an OpenStack CPU pool and a libvirt GPU
# pool. A single-backend setup is just one [[pool]] (see config.libvirt.example.toml).
#
# This file is read ONCE, at startup — huskd does not hot-reload it. Any change
# means restarting huskd, which is cheap and safe: there is no state file, every
# slot is re-adopted from backend metadata on the first tick, and a slot running a
# job is left alone. Under k8s, put a checksum annotation over the ConfigMap on the
# pod template so editing it actually triggers a rolling restart.
#
# Check this file without touching a cloud, a hypervisor or GitHub:
#   huskctl validate -c config.toml   # exit 0 = valid, 2 = not, one line per problem
# Unknown keys are errors, not defaults — a typo fails the load rather than quietly
# leaving the default in place. Run it as a k8s initContainer so a bad ConfigMap
# fails the rollout instead of starting a misconfigured daemon.
#
# Log verbosity: --log-level DEBUG (or -l), or $HUSK_LOG_LEVEL (default INFO).
# The App private key is NOT stored here. It is resolved in priority order:
#   1. $HUSK_GITHUB__PRIVATE_KEY    (the PEM contents, e.g. from a secret store)
#   2. [github].private_key_path    (path to the .pem; k8s Secret mount, 0400)

[github]                               # GitHub App identity (replaces repo + PAT)
app_id = 123456                        # from the App's settings page
private_key_path = "/etc/husk/husk-app.pem"   # or env HUSK_GITHUB__PRIVATE_KEY (PEM contents)

# Each [[pool]] names the ONE target it serves:
#   target = { org  = "acts-project", group = "husk" }   # org-level runners
#   target = { repo = "owner/name" }                     # that repo only
# `group` is an org-only concept (repo scope has no runner groups), so the schema
# only lets you write one where it means something. A pool is served when the App
# is installed on that org / that repo was granted to the install; otherwise the
# pool drains and idles.

[controller]                           # shared: one lock / state / http per daemon
lock_path = "/tmp/huskd.lock"
http_addr = "127.0.0.1:9100"           # dashboard + /status /metrics /healthz /events; "0.0.0.0:9100" to expose
shrink_ticks = 3                       # sustained-surplus ticks before ramp-down
# Garbage-collect dead GitHub runner registrations: "off" (default) | "dry-run" | "on".
# A slot whose runner never connects strands its registration offline forever, and
# they accumulate until something reaps them. Always scoped to the pool's vm_prefix,
# and never touches a registration a live slot might still use (an offline runner at
# the slot's CURRENT cycle is the mid-boot case, and is kept). Start with "dry-run"
# and read the logs before switching to "on" — this deletes GitHub state on a timer.
# reap_runners = "dry-run"
# image_cache_dir = "/var/cache/husk/images"  # optional; default ~/.cache/husk/images. Shared by every pool
# Self-GC'd: a golden no pool still needs is dropped 24h after its last use, so the
# cache holds the images in service plus roughly a day of rollout churn.
# Where central Prometheus reaches THIS huskd. /sd/targets hands it out as the
# address of the libvirt targets, whose guests are private and so are scraped back
# through huskd. Defaults to http_addr; set it only if huskd is reached on a
# different address than it binds (behind a NAT, k8s Service, or ingress).
# advertise_addr = "huskd.cern.ch:9100"
# Where huskd persists its accumulated counters/histograms (failure counts, recycle
# duration distributions) so they survive a restart. Unset ⇒ they reset to zero on
# every boot, which — since any config change means a restart — quietly caps how
# far back `increase(...[30d])` or a p95 recycle time can actually see. A few KB;
# a small PVC (or any writable path) is enough. Nothing about slot state is stored
# here: slots are still re-adopted from backend metadata on the first tick.
# metrics_state_path = "/var/lib/husk/metrics.json"

# ───────────────────────────── pool 1: OpenStack CPU ─────────────────────────
# `name` is the pool identity: it becomes the backend name AND the default
# vm_prefix (husk-<slug(name)>). Pools MUST have distinct names — GitHub's runner
# APIs are repo-wide, so isolation relies on pool-unique VM/runner names + labels.
[[pool]]
name = "openstack-cpu"
target = { org = "acts-project", group = "husk" }

[pool.runner]
version = "2.334.0"
# Labels are DERIVED from the facts below, never listed by hand — a hand-written
# list drifts (a pool keeps advertising `gpu` after its GPU host is removed and
# nothing disagrees). huskd logs the computed set per pool at startup.
#   arch  = "x64" | "arm64"   → the label AND the runner tarball it downloads
#   size  = "standard" | "large"  (omit entirely on GPU pools; see pool 2)
# This pool derives:
#   self-hosted linux x64 x86_64 husk husk-pool-openstack-cpu
#   husk-backend-openstack husk-size-standard
arch = "x64"
size = "standard"
# Capability labels husk has no vocabulary for. The husk-* namespace is reserved
# for derived labels and is rejected here.
# extra_labels = ["acts"]
# prebaked = true  # set ONLY when image_ref points at a husk golden: cloud-init then
#                  # skips the runner/podman install and `version` must match the image.
# In-guest metrics (observability.md). Opens :9100 (node_exporter, baked into the
# golden) to this source ONLY — it has no TLS/auth, so this allowlist IS the access
# control. Requires prebaked. Unset (default) = fail-closed: no rule, no exporter.
# On OpenStack the scraper is central Prometheus, which hits the guest directly —
# so this is Prometheus's own source range. If it runs in k8s, that is the WORKER
# NODE subnet, not the pod CIDR: pods egressing out of the cluster are SNAT'd to
# the node, so the guest never sees a pod IP. Confirm empirically before setting.
# scrape_cidr = "137.138.0.0/16"

[pool.backend]
type = "openstack"
cloud = "cern"                         # clouds.yaml profile (app credential)
flavor_name = "m2.small"
network_name = "CERN_NETWORK"
keypair = "acts-gha"
rebuild_microversion = "2.79"
min_ready = 1
max_total = 2
# Image source — pick ONE:
#  (a) image_name: an existing Glance image (stock ALMA10 + cloud-init installs the stack).
image_name = "ALMA10 - x86_64"
#  (b) image_ref: an OCI golden built by build-images.yml on ghcr — the SAME artifact the
#      libvirt hosts use. huskd oras-pulls it and uploads it to Glance as
#      husk-golden-<digest> (idempotent); drains onto a new ref after a restart. Pair
#      with [pool.runner] prebaked = true.
# image_ref = "ghcr.io/acts-project/husk-base:v1"

[pool.timeouts]
poll_interval_sec = 30
idle_timeout_sec = 1800                # rebuild idle slots to refresh credentials
startup_grace_sec = 300               # post-rebuild grace for the runner to register
max_job_duration_sec = 21600          # 6h — stop (not destroy) busy slots beyond this

# CernVM-FS (/cvmfs) for this pool's slots. Opt-in; omit the table for no CVMFS.
# The client + autofs are BAKED into the golden image, so this REQUIRES
# [pool.runner] prebaked = true (a stock image has no client — the loader rejects
# the combination). Each cycle cloud-init writes the client config, eager-mounts
# every listed repo, binds each /cvmfs/<repo> into every job container (per-repo,
# not a whole-/cvmfs bind — the autofs root readdir is denied under the rootless
# user namespace), and opens ONE firewall hole for the proxy: it resolves the
# proxy hostnames in-guest and allows their IPs, since CERN's squids live inside
# the CERN-internal ranges the egress firewall otherwise drops.
# [pool.cvmfs]
# repositories = ["sft.cern.ch", "atlas.cern.ch", "atlas-condb.cern.ch", "atlas-nightlies.cern.ch"]
# http_proxy = "http://ca-proxy-atlas.cern.ch:3128;http://ca-proxy.cern.ch:3128"  # CERN Squid (`;` = failover)
# quota_limit_mb = 4000                # CVMFS_QUOTA_LIMIT; mind the slot's root disk (m2.small = 10 GiB)

# Named holes in the coarse egress firewall. It drops the CERN-internal ranges
# wholesale, which is the security property — but that also blackholes CERN's own
# package mirrors, so a job running `dnf install` inside a CERN-built image fails
# with a timeout far from the cause. List hostnames, not addresses: they are
# resolved in-guest on every recycle, because the hosts worth listing are
# load-balanced aliases whose A-records rotate. Unlike [pool.cvmfs] this works on
# stock images too (nothing about it is baked). Each entry grants the slot's JOBS
# full outbound access to that host, so keep the list short.
# [pool.egress]
# allow_hosts = ["linuxsoft.cern.ch"]  # CERN package mirror (dnf/yum in job containers)

# ───────────────────────────── pool 2: libvirt GPU ──────────────────────────
[[pool]]
name = "libvirt-gpu"
target = { org = "acts-project", group = "husk" }

[pool.runner]
version = "2.334.0"
arch = "x64"
# The GPU VENDOR ("nvidia" | "amd"), which both activates the driver (modprobe +
# CDI) each boot and mints the accelerator labels. Note there is no `size` here:
# GPU pools carry no size label, because `runs-on: [..., husk-size-large]` would
# then match GPU hardware — the accelerator labels ARE the class. Setting both is
# a config error.
#
# This pool derives:
#   self-hosted linux x64 x86_64 husk husk-pool-libvirt-gpu husk-backend-libvirt
#   gpu gpu-nvidia gpu-a100 cuda
#
# `cuda`/`rocm` promise a DEVICE, not a toolkit — the toolkit arrives in the job's
# container image, and most CUDA/HIP jobs only compile, which any CPU slot can do.
# Compile-only legs belong on a CPU pool with a CUDA image; sending them here just
# starves the jobs that need the hardware.
gpu = "nvidia"
gpu_model = "a100"                     # optional → the `gpu-a100` label
prebaked = true                        # husk-gpu golden: skip install (version must match the image)
# In-guest metrics (observability.md). On libvirt the guest is on a private net
# that only its hypervisor can reach, so huskd bridges the scrape: it SSHes to the
# host (the channel it already holds) and curls the guest. The connection therefore
# originates from the libvirt BRIDGE, not from Prometheus — so the bridge is what
# :9100 is opened to. 192.168.122.1 is the default libvirt network's bridge.
# Nothing to deploy on the host for this.
scrape_cidr = "192.168.122.1/32"

[pool.backend]
type = "libvirt"
min_ready = 1
max_total = 1                          # one GPU host, one GPU → 1 (raise as the pool grows)
image_ref = "ghcr.io/acts-project/husk-gpu:v1"   # oras-pulled + scp'd to each host by digest

# One entry per VM-host. GPU host: list gpu_pci_addresses (one slot per GPU).
# CPU host: omit them and set max_slots (default 1). Setting both is rejected.
[[pool.backend.hosts]]
name = "fedora-gpu-01"
libvirt_uri = "qemu+ssh://USER@HOST/system"
# ssh_target = "USER@HOST"             # optional; derived from libvirt_uri if omitted
storage_pool = "husk"
network = "default"
memory_mb = 8192
vcpus = 8
gpu_pci_addresses = ["0000:01:00.0"]   # → one slot, GPU passed through via <hostdev>
# NB: nothing here for metrics. huskd reaches this host's guests over ssh_target
# (above), so adding a hypervisor needs no per-host metrics setup at all.

[pool.timeouts]
poll_interval_sec = 30
idle_timeout_sec = 1800
startup_grace_sec = 300
max_job_duration_sec = 21600
