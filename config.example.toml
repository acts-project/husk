# Husk controller config. Precedence: env (HUSK_*) > this file > defaults.
# Log verbosity: --log-level DEBUG (or -l), or $HUSK_LOG_LEVEL (default INFO) —
# affects only the husk logger; third-party libs (keystoneauth, urllib3, ...)
# stay at WARNING unless you raise $HUSK_ROOT_LOG_LEVEL.
# Env override examples:
#   HUSK_BACKEND__MIN_READY=2  HUSK_GITHUB__REPO=acts-project/foo
# The GitHub PAT is NOT stored here. It is resolved in priority order:
#   1. $HUSK_GITHUB__PAT            (explicit override)
#   2. $GH_TOKEN                    (local dev — just `export GH_TOKEN=ghp_...`)
#   3. [github].pat_path file       (k8s Secret mount, 0400)

[github]
repo = "acts-project/husk-test"
# pat_env = "GH_TOKEN"              # env var name for local dev (this is the default)
# pat_path = "/etc/husk/github-pat" # k8s Secret mount

[controller]
lock_path = "/tmp/huskd.lock"
state_path = "/tmp/huskd-state.json"   # same-host fallback snapshot file
http_addr = "127.0.0.1:9100"           # huskd serves /status /metrics /healthz; "0.0.0.0:9100" to expose; "" to disable
shrink_ticks = 3                       # sustained-surplus ticks before ramp-down

[runner]
version = "2.334.0"
labels = ["self-hosted", "linux", "x64", "husk-phase3"]
runner_group_id = 1
# prebaked = true  # set ONLY when image_ref (below) points at a husk golden image:
#                  # cloud-init then skips the runner/podman install (all baked) and
#                  # `version` above must match the image's husk.runner.version.

[backend]
name = "openstack-cern"
type = "openstack"
cloud = "cern"                         # clouds.yaml profile (app credential)
flavor_name = "m2.small"
network_name = "CERN_NETWORK"
keypair = "acts-gha"
rebuild_microversion = "2.79"
min_ready = 1
max_total = 2

# Image source — pick ONE:
#  (a) image_name: an existing Glance image, resolved by name (the classic path —
#      stock ALMA10 + cloud-init installs the runner/podman stack each boot).
image_name = "ALMA10 - x86_64"
#
#  (b) image_ref: an OCI golden built by build-images.yml on ghcr — the SAME
#      artifact the libvirt hosts use. huskd `oras pull`s it once to a local cache
#      and uploads the qcow2 to Glance as `husk-golden-<digest>` (idempotent on
#      digest). Editing this while huskd runs hot-reloads: the new image is
#      uploaded and idle slots drain onto it (running jobs finish first), then the
#      superseded Glance image is GC'd. Pair with [runner] prebaked = true.
# image_ref = "ghcr.io/acts-project/husk-base:v1"
# image_cache_dir = "/var/cache/husk/images"   # optional; default ~/.cache/husk/images

[timeouts]
poll_interval_sec = 30
idle_timeout_sec = 1800                # rebuild idle slots to refresh credentials
startup_grace_sec = 300               # post-rebuild grace for the runner to register
max_job_duration_sec = 21600          # 6h — stop (not destroy) busy slots beyond this
