apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: husk

resources:
  - ../../base
  - pvc.yaml
  - route.yaml

# See the note in overlays/local: a base's transformers do not reach a generator
# declared in the overlay, so without this the ConfigMaps are unlabelled and no
# label selector can find them.
labels:
  - includeSelectors: false
    pairs:
      app.kubernetes.io/name: huskd

configMapGenerator:
  - name: huskd-config
    files:
      - config.toml

images:
  - name: ghcr.io/acts-project/husk
    newTag: latest  # `just k8s-live-deploy` overwrites this with the sha- tag

patches:
  # Swap the base's emptyDir volumes for PVCs: the golden-image cache, and huskd's
  # own metrics state.
  #
  # These are JSON6902 patches replacing whole volume entries, NOT strategic
  # merges. A merge on `volumes` merges by name and would leave emptyDir AND
  # persistentVolumeClaim both set on the volume, which the API server rejects
  # ($retainKeys is not honoured for an inline patch here). Replacing the entry
  # outright is unambiguous.
  #
  # The indices must match base/deployment.yaml's volume order
  # (config, openstack, image-cache, run, metrics-state). Each `value` restates
  # the name, so a wrong index shows up immediately in `just k8s-render cern` as a
  # volume named image-cache sitting in the wrong slot, rather than as silent
  # breakage.
  - target:
      kind: Deployment
      name: huskd
    patch: |-
      # Zero-downtime dashboard across a deploy. The base is Recreate (its lock is a
      # per-pod emptyDir; overlapping pods would each hold their own and both
      # reconcile). Here the lock is a SHARED PVC (below), so it is safe to keep the
      # outgoing pod up — still serving AND reconciling — until the new pod is Ready,
      # then let it drain and release the lock. maxUnavailable:0 guarantees the
      # overlap; the new pod serves a standby dashboard while it waits for the lock.
      - op: replace
        path: /spec/strategy
        value:
          type: RollingUpdate
          rollingUpdate:
            maxSurge: 1
            maxUnavailable: 0
      - op: replace
        path: /spec/template/spec/volumes/2
        value:
          name: image-cache
          persistentVolumeClaim:
            claimName: huskd-image-cache
      # The controller lock moves off the base's per-pod emptyDir onto a shared RWX
      # claim so both rolling-update pods contend on the same flock — that mutual
      # exclusion is what keeps exactly one reconciler despite the overlap. Index 3
      # is the `run` volume (config, openstack, image-cache, run, metrics-state).
      - op: replace
        path: /spec/template/spec/volumes/3
        value:
          name: run
          persistentVolumeClaim:
            claimName: huskd-lock
      # Without this, huskd's counters reset on every pod restart — and since
      # there is no config hot-reload, every config change IS a restart.
      - op: replace
        path: /spec/template/spec/volumes/4
        value:
          name: metrics-state
          persistentVolumeClaim:
            claimName: huskd-metrics-state
