apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: huskd-image-cache
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: cephfs-ssd-no-backup
  resources:
    requests:
      # Sized from the real published artifacts (ghcr, 2026-07):
      #   husk-base:v4  1.96 GB     husk-gpu:v4  4.08 GB   -> 6.0 GB resident today
      #   husk-base:v3  1.93 GB     husk-gpu:v3  3.92 GB   (~2-4% growth per bump)
      #
      # The cache is keyed by CONTENT DIGEST (one dir per digest) and evicts
      # itself (ImageSync.gc): each pool pins the digests it still serves, and a
      # digest nobody pins goes 24h after its last use — so this holds the goldens
      # in service plus about a day of rollout churn (~12 GB right after both
      # variants are bumped), not every golden ever pulled.
      #
      # 50Gi therefore leaves plenty of headroom. Watch it anyway: a full cache
      # means the pull for a NEW golden fails, i.e. it breaks exactly the rollout
      # you were trying to do. Inspect, and reclaim by hand if ever needed, with
      #   kubectl exec deploy/huskd -n husk -- du -sh /app/.cache/husk/images/*
      #   kubectl exec deploy/huskd -n husk -- rm -rf /app/.cache/husk/images/sha256-<old>
      # (safe while running: a deleted digest is simply re-pulled on next resolve).
      storage: 50Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: huskd-metrics-state
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: cephfs-ssd-no-backup
  resources:
    requests:
      # huskd's accumulated counters/histograms (controller.metrics_state_path).
      #
      # A SEPARATE claim from the image cache on purpose, despite being tiny.
      # Their lifetimes are unrelated and their sizes differ by four orders of
      # magnitude: the cache is swept on its own schedule by ImageSync.gc and is
      # the directory operators are pointed at when reclaiming space, so parking
      # a state file inside it invites an `rm -rf` that takes the metrics with it.
      # Sharing would also couple this file's durability to a 50Gi volume sized
      # for multi-GB churn.
      #
      # 1Gi is far more than the content needs, deliberately. This file cannot
      # grow with usage at all: no event-time instrument carries a
      # per-slot label (asserted by a test in tests/test_metrics.py), so the
      # series count is bounded by config — pools x actions x reasons x buckets —
      # not by how many slots have passed through. Measured: 3.4 KB for two pools
      # after 500 recycles; 11.7 KB for six pools with EVERY labelset populated,
      # which is about the ceiling.
      #
      # Losing this volume is not an incident: huskd logs it and starts every
      # counter from zero, which Prometheus reads as an ordinary counter reset.
      storage: 1Gi
