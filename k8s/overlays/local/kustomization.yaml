apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: husk

resources:
  - ../../base
  - namespace.yaml

configMapGenerator:
  - name: huskd-config
    files:
      - config.toml

images:
  # Built straight into colima's docker daemon; k3s there runs on cri-dockerd, so
  # the image is visible without a registry push. `newTag` is a marker, not a
  # thing to pull — hence the Never below.
  - name: ghcr.io/acts-project/husk
    newName: husk        # matches `image := "husk:local"` in the justfile
    newTag: local

patches:
  - target:
      kind: Deployment
      name: huskd
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Never
